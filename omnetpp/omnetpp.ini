# ==============================================================================
# SHADOW-Net — OMNeT++ / INET Simulation Configuration
# ==============================================================================
# Paper: "SHADOW-Net: Delay-Aware Dynamic SMPC and Opportunistic Caching
#         in Privacy-Preserving FANETs"
# Author: Amauri Ribeiro
#
# Companion configuration for ShadowManet.ned.
# Configures 3D mobility, AODV routing, IEEE 802.11 radio, and UDP SMPC
# payload exchange for the 5-UAV FANET topology.
# ==============================================================================

[General]
network = shadownet.ShadowManet
sim-time-limit = 300s
repeat = 5

# ── Random Number Generator ──────────────────────────────────────────────────
seed-set = ${repetition}

# ── 3D Airspace Constraint Area ──────────────────────────────────────────────
# 1000m × 1000m ground footprint, 500m altitude ceiling (urban corridor)
*.uav[*].mobility.constraintAreaMinX = 0m
*.uav[*].mobility.constraintAreaMaxX = 1000m
*.uav[*].mobility.constraintAreaMinY = 0m
*.uav[*].mobility.constraintAreaMaxY = 1000m
*.uav[*].mobility.constraintAreaMinZ = 50m      # Minimum safe flight altitude
*.uav[*].mobility.constraintAreaMaxZ = 500m     # Urban altitude ceiling

# ── 3D Mobility Model ───────────────────────────────────────────────────────
# RandomWaypointMobility with 3D waypoints simulates delivery flight patterns.
*.uav[*].mobility.typename = "RandomWaypointMobility"
*.uav[*].mobility.initFromDisplayString = false
*.uav[*].mobility.speed = uniform(8mps, 22mps)          # ~30-80 km/h
*.uav[*].mobility.waitTime = uniform(0s, 2s)             # Hover time at waypoint
*.uav[*].mobility.initialX = uniform(100m, 900m)
*.uav[*].mobility.initialY = uniform(100m, 900m)
*.uav[*].mobility.initialZ = uniform(100m, 400m)         # Initial altitude

# ── AODV Reactive Routing (Paper §III-A) ─────────────────────────────────────
# AODV is the standard for dynamic MANET topologies with high mobility.
*.uav[*].routing.typename = "Aodv"

# ── IEEE 802.11 Wireless NIC Configuration ───────────────────────────────────
# Ad-Hoc mode, no Access Point.  Models the MAC-layer overhearing (§IV-C).
*.uav[*].wlan[0].typename = "Ieee80211Interface"
*.uav[*].wlan[0].mgmt.typename = "Ieee80211MgmtAdhoc"
*.uav[*].wlan[0].agent.typename = ""

# Radio parameters — approximate outdoor IEEE 802.11n
*.uav[*].wlan[0].radio.typename = "Ieee80211ScalarRadio"
*.uav[*].wlan[0].radio.transmitter.power = 20mW          # ~13 dBm
*.uav[*].wlan[0].radio.transmitter.bitrate = 54Mbps
*.uav[*].wlan[0].radio.receiver.sensitivity = -85dBm
*.uav[*].wlan[0].radio.receiver.energyDetection = -85dBm

# ── Radio Medium Parameters ──────────────────────────────────────────────────
*.radioMedium.pathLoss.typename = "FreeSpacePathLoss"
*.radioMedium.backgroundNoise.power = -110dBm

# ── IPv4 Configurator ───────────────────────────────────────────────────────
*.configurator.config = xml("<config><interface hosts='**' address='10.0.x.x' netmask='255.255.0.0'/></config>")

# ── UDP Application Layer — SMPC Matrix Exchange ─────────────────────────────
# Simulates periodic SMPC matrix broadcasts between UAVs.
# Payload sizes match the dynamic field scaling (§IV-A):
#   64-bit share × 16 cells =  128 bytes  (High-Power)
#   48-bit share × 16 cells =   96 bytes  (Medium-Power)
#   40-bit share × 16 cells =   80 bytes  (Critical-Power)

*.uav[*].numApps = 1
*.uav[*].app[0].typename = "UdpBasicApp"
*.uav[*].app[0].destAddresses = "uav[0] uav[1] uav[2] uav[3] uav[4]"
*.uav[*].app[0].destPort = 5000
*.uav[*].app[0].localPort = 5000
*.uav[*].app[0].startTime = uniform(0s, 1s)
*.uav[*].app[0].sendInterval = exponential(2s)  # Avg 2s between SMPC rounds

# ── Recording / Statistics ───────────────────────────────────────────────────
*.uav[*].wlan[0].radio.energyConsumer.typename = "StateBasedEpEnergyConsumer"
**.result-recording-modes = +vector,+histogram

# ==============================================================================
# SCENARIO CONFIGURATIONS — SOC Tiers (Paper §IV-A)
# ==============================================================================
# Each scenario fixes the SMPC payload size to match the corresponding
# SOC-driven field scaling tier, allowing direct comparison of PDR,
# channel occupation, and energy consumption.

# ── High-Power Tier (SOC > 70%): 64-bit shares ──────────────────────────────
[Config HighPower]
description = "SOC > 70% — 64-bit SecInt shares (128-byte SMPC payload)"
*.uav[*].app[0].messageLength = 128B

# ── Medium-Power Tier (30% < SOC ≤ 70%): 48-bit shares ──────────────────────
[Config MediumPower]
description = "30% < SOC ≤ 70% — 48-bit SecInt shares (96-byte SMPC payload)"
*.uav[*].app[0].messageLength = 96B

# ── Critical-Power Tier (SOC ≤ 30%): 40-bit shares ──────────────────────────
[Config CriticalPower]
description = "SOC ≤ 30% — 40-bit SecInt shares (80-byte SMPC payload)"
*.uav[*].app[0].messageLength = 80B
